cat > static/totem.html << 'EOF'
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Totem Intelligente • Scegli i tuoi prodotti</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(90deg, #2c3e50, #3498db);
      color: white;
      padding: 30px 40px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 600;
    }
    .header p {
      margin: 10px 0 0;
      opacity: 0.95;
      font-size: 18px;
    }
    .main {
      padding: 40px;
    }
    .filters {
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 19px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 12px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }
    .filter-btn {
      padding: 16px 20px;
      border: 2px solid #e2e8f0;
      background: white;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      position: relative;
    }
    .filter-btn:hover {
      border-color: #3498db;
      transform: translateY(-3px);
    }
    .filter-btn.active {
      background: #3498db;
      color: white;
      border-color: #3498db;
    }
    .counter {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #e74c3c;
      color: white;
      font-size: 13px;
      font-weight: 600;
      min-width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shelf-select {
      margin-bottom: 30px;
    }
    select {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: white;
    }
    button {
      width: 100%;
      padding: 18px;
      font-size: 19px;
      font-weight: 600;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px 0;
    }
    button:hover { background: #219a52; }

    .reset-btn {
      background: #95a5a6;
    }
    .reset-btn:hover { background: #7f8c8d; }

    .show-all-btn {
      background: #3498db;
    }
    .show-all-btn:hover { background: #2980b9; }

    .results {
      margin-top: 40px;
    }
    .result-section {
      margin-bottom: 35px;
      padding: 25px;
      border-radius: 16px;
    }
    .safe { background: #d5f4e6; }
    .warning { background: #fff3cd; }
    .unknown { background: #f8d7da; }

    .product {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .product:last-child { border-bottom: none; }
    .product img {
      width: 65px;
      height: 65px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #eee;
    }
    .product-info {
      flex: 1;
    }
    .product-name {
      font-weight: 600;
      font-size: 17px;
    }
    .product-brand {
      color: #7f8c8d;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛒 Totem Intelligente</h1>
      <p>Seleziona le tue esigenze e scopri i prodotti compatibili nello scaffale</p>
    </div>

    <div class="main">
      <div class="filters">
        <div class="section-title">
          Cosa vuoi evitare? 
          <span id="counter" style="color:#e74c3c; font-weight:600;"></span>
        </div>
        <div class="filter-grid" id="filters"></div>
      </div>

      <div class="shelf-select">
        <div class="section-title">Scegli lo scaffale</div>
        <select id="shelfSelect">
          <option value="store_001-A12-R2">Biscotti e Snack - Ripiano 2</option>
          <option value="store_001-A12-R1">Prodotti Free-From - Ripiano 1</option>
        </select>
      </div>

      <button onclick="checkShelf()">🔍 Cerca prodotti compatibili</button>
      <button class="show-all-btn" onclick="showAllProducts()">📋 Mostra tutti i prodotti</button>
      <button class="reset-btn" onclick="resetFilters()">🔄 Reset filtri</button>

      <div class="results" id="results"></div>
    </div>
  </div>

  <script>
    const filtersList = [
      {id: "latte", label: "Latte / Lattosio"},
      {id: "glutine", label: "Glutine"},
      {id: "soia", label: "Soia"},
      {id: "uova", label: "Uova"},
      {id: "arachidi", label: "Arachidi"},
      {id: "frutta_guscio", label: "Frutta a guscio"},
      {id: "olio_palma", label: "Olio di Palma"}
    ];

    let selected = [];

    function updateCounter() {
      const counter = document.getElementById('counter');
      counter.textContent = selected.length > 0 ? `(${selected.length})` : '';
    }

    function renderFilters() {
      const container = document.getElementById('filters');
      container.innerHTML = '';
      filtersList.forEach(f => {
        const btn = document.createElement('div');
        btn.className = `filter-btn ${selected.includes(f.id) ? 'active' : ''}`;
        btn.textContent = f.label;
        btn.onclick = () => {
          if (selected.includes(f.id)) {
            selected = selected.filter(id => id !== f.id);
          } else {
            selected.push(f.id);
          }
          renderFilters();
          updateCounter();
        };
        container.appendChild(btn);
      });
      updateCounter();
    }

    function resetFilters() {
      selected = [];
      renderFilters();
      document.getElementById('results').innerHTML = '';
    }

    async function checkShelf() {
      const shelfId = document.getElementById('shelfSelect').value;
      const resultsDiv = document.getElementById('results');
      
      resultsDiv.innerHTML = '<p style="text-align:center; color:#666; padding:40px;">Analisi in 
corso...</p>';

      try {
        const res = await fetch('https://pocretail-production.up.railway.app/shelf/check', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            shelf_id: shelfId,
            filters: selected,
            strict_mode: false
          })
        });

        const data = await res.json();
        renderResults(data);
      } catch (e) {
        resultsDiv.innerHTML = `<p style="color:red; text-align:center;">Errore di connessione al 
server</p>`;
      }
    }

    async function showAllProducts() {
      const shelfId = document.getElementById('shelfSelect').value;
      const resultsDiv = document.getElementById('results');
      
      resultsDiv.innerHTML = '<p style="text-align:center; color:#666; padding:40px;">Caricamento di 
tutti i prodotti...</p>';

      try {
        const res = await fetch('https://pocretail-production.up.railway.app/shelf/check', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            shelf_id: shelfId,
            filters: [],
            strict_mode: false
          })
        });

        const data = await res.json();
        renderResults(data, true); // true = mostra tutti
      } catch (e) {
        resultsDiv.innerHTML = `<p style="color:red; text-align:center;">Errore di connessione al 
server</p>`;
      }
    }

    function renderResults(data, showAll = false) {
      const resultsDiv = document.getElementById('results');
      let html = `<h2 style="text-align:center; color:#2c3e50;">Risultati per ${data.shelf_id}</h2>`;

      if (data.safe_products.length > 0) {
        html += `<div class="result-section safe"><h3>✅ Prodotti Sicuri 
(${data.safe_products.length})</h3>`;
        data.safe_products.forEach(p => {
          html += `
            <div class="product">
              <img src="https://picsum.photos/id/${Math.floor(Math.random()*200)+10}/65/65" 
alt="${p.name}">
              <div class="product-info">
                <div class="product-brand">${p.brand}</div>
                <div class="product-name">${p.name}</div>
              </div>
            </div>`;
        });
        html += `</div>`;
      }

      if (data.warning_products.length > 0) {
        html += `<div class="result-section warning"><h3>⚠️ Da Verificare 
(${data.warning_products.length})</h3>`;
        data.warning_products.forEach(p => {
          html += `
            <div class="product">
              <img src="https://picsum.photos/id/${Math.floor(Math.random()*200)+10}/65/65" 
alt="${p.name}">
              <div class="product-info">
                <div class="product-brand">${p.brand}</div>
                <div class="product-name">${p.name}</div>
                <small>(${p.reasons.join(', ')})</small>
              </div>
            </div>`;
        });
        html += `</div>`;
      }

      if (data.unknown_products.length > 0 && !showAll) {
        html += `<div class="result-section unknown"><h3>❓ Non verificabili 
(${data.unknown_products.length})</h3>`;
        data.unknown_products.forEach(p => {
          html += `<div class="product"><strong>${p.name}</strong></div>`;
        });
        html += `</div>`;
      }

      resultsDiv.innerHTML = html;
    }

    // Inizializza
    renderFilters();
  </script>
</body>
</html>
EOF
