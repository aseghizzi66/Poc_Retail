<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Totem Intelligente</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
    .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 
0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
    .header { background: #2c3e50; color: white; padding: 25px; text-align: center; }
    .main { padding: 30px; }
    .filters { margin: 20px 0; }
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 
10px; }
    .filter-btn {
      padding: 14px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 16px;
    }
    .filter-btn.active { background: #3498db; color: white; border-color: #3498db; }
    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .search-btn { background: #27ae60; color: white; }
    .showall-btn { background: #3498db; color: white; }
    .reset-btn { background: #95a5a6; color: white; }
    .results { margin-top: 30px; }
    .product { padding: 12px; border-bottom: 1px solid #eee; display: flex; gap: 15px; align-items: 
center; }
    .product img { width: 55px; height: 55px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛒 Totem Intelligente</h1>
      <p>Seleziona cosa evitare e cerca i prodotti compatibili</p>
    </div>

    <div class="main">
      <div class="filters">
        <h3>Cosa vuoi evitare?</h3>
        <div class="filter-grid" id="filters"></div>
      </div>

      <select id="shelfSelect" style="width:100%; padding:12px; margin:15px 0; font-size:16px;">
        <option value="store_001-A12-R2">Biscotti e Snack - Ripiano 2</option>
        <option value="store_001-A12-R1">Prodotti Free-From - Ripiano 1</option>
      </select>

      <button class="search-btn" onclick="checkShelf()">🔍 Cerca prodotti compatibili</button>
      <button class="showall-btn" onclick="showAllProducts()">📋 Mostra tutti i prodotti</button>
      <button class="reset-btn" onclick="resetFilters()">🔄 Reset filtri</button>

      <div class="results" id="results"></div>
    </div>
  </div>

  <script>
    const filtersList = ["latte", "glutine", "soia", "uova", "arachidi", "olio_palma"];
    let selected = [];

    function renderFilters() {
      const container = document.getElementById('filters');
      container.innerHTML = '';
      filtersList.forEach(f => {
        const btn = document.createElement('div');
        btn.className = `filter-btn ${selected.includes(f) ? 'active' : ''}`;
        btn.textContent = f.charAt(0).toUpperCase() + f.slice(1);
        btn.onclick = () => {
          if (selected.includes(f)) selected = selected.filter(item => item !== f);
          else selected.push(f);
          renderFilters();
        };
        container.appendChild(btn);
      });
    }

    async function checkShelf() {
      const shelfId = document.getElementById('shelfSelect').value;
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<p>Caricamento...</p>';

      try {
        const response = await fetch('https://pocretail-production.up.railway.app/shelf/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ shelf_id: shelfId, filters: selected, strict_mode: false })
        });
        const data = await response.json();
        renderResults(data);
      } catch (err) {
        resultsDiv.innerHTML = '<p style="color:red;">Errore di connessione</p>';
      }
    }

    async function showAllProducts() {
      const shelfId = document.getElementById('shelfSelect').value;
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<p>Caricamento...</p>';

      try {
        const response = await fetch('https://pocretail-production.up.railway.app/shelf/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ shelf_id: shelfId, filters: [], strict_mode: false })
        });
        const data = await response.json();
        renderResults(data);
      } catch (err) {
        resultsDiv.innerHTML = '<p style="color:red;">Errore di connessione</p>';
      }
    }

    function renderResults(data) {
      const div = document.getElementById('results');
      let html = `<h3>Risultati per ${data.shelf_id || 'Scaffale'}</h3>`;

      if (data.safe_products && data.safe_products.length > 0) {
        html += `<h4>✅ Sicuri (${data.safe_products.length})</h4>`;
        data.safe_products.forEach(p => {
          html += `<div class="product"><strong>${p.brand}</strong> - ${p.name}</div>`;
        });
      }
      div.innerHTML = html;
    }

    function resetFilters() {
      selected = [];
      renderFilters();
      document.getElementById('results').innerHTML = '';
    }

    // Inizializza
    renderFilters();
  </script>
</body>
</html>
